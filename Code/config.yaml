sample_rate: 16000
clip_duration_s: 60
long_audio_duration_s: 60
random_seed: 1234

factors:
  # overlap_ratio: [0.2]
  overlap_ratio: [0, 0.14, 0.2, 0.4]
  speaker_count: [2]
  snr_db: [null, 7.4, 0, -5]
  # snr_db: [null]
  noise_type: [D,P,T]
  # noise_type: [D]
  audio_type: [synthetic, real]
  preprocessing: [none, enhancement, separation, target_speaker_filter, enhancement_then_separation]
  embedding_available: [false, true]
  speaker_spacing: 
    mu: 0.2
    sigma: 0.1
  overlap_std_ratio: 0.01

asr_models:
  - faster_whisper
  - wav2vec2_large_960h
  - parakeet_tdt_0_6b_v3
  - nemo_canary_qwen_2_5b
  - granite_speech_3_3_8b
  - phi4_multimodal_instruct

min_length_s: 10
min_length_s_0.75: 20
n_mixtures_clean: 10
n_mixtures_per_condition: 100
